# PhxNorth Backend - Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    build:
      target: production
    command: >
      poetry run gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
      --access-logfile -
    volumes: []  # No bind mounts in production
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://phxnorth:${POSTGRES_PASSWORD}@postgres:5432/phxnorth
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=["kafka:9092"]
      - SECRET_KEY=${SECRET_KEY}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    restart: always

  # ---------------------------------------------------------------------------
  # Celery Workers
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      target: production
    command: >
      poetry run celery -A app.workers.celery_app worker
      --loglevel=warning
      --concurrency=4
    volumes: []
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://phxnorth:${POSTGRES_PASSWORD}@postgres:5432/phxnorth
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=["kafka:9092"]
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: always

  celery-beat:
    build:
      target: production
    command: poetry run celery -A app.workers.celery_app beat --loglevel=warning
    volumes: []
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: always

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: always

  redis:
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: always

  kafka:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: always
