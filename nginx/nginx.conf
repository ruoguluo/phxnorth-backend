# =============================================================================
# PhxNorth Backend - Main Nginx Configuration
# =============================================================================
# Reverse proxy for FastAPI application with SSL termination,
# rate limiting, and security hardening.
#
# SSL Setup with Certbot:
#   1. Install certbot: apt install certbot python3-certbot-nginx
#   2. Obtain certificate: certbot --nginx -d your-domain.com
#   3. Auto-renewal: certbot renew --dry-run
#   4. Cron: 0 12 * * * /usr/bin/certbot renew --quiet
# =============================================================================

user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # =========================================================================
    # Basic Settings
    # =========================================================================
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Max upload size (10MB for CV/file uploads)
    client_max_body_size 10m;

    # =========================================================================
    # Logging
    # =========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # =========================================================================
    # Gzip Compression
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        text/css
        text/javascript
        text/plain
        text/xml;

    # =========================================================================
    # Rate Limiting Zones
    # =========================================================================
    # Events endpoint: 1000 requests/min per client IP (~17 req/sec)
    # Using 10m zone = ~160,000 unique IPs tracked
    limit_req_zone $binary_remote_addr zone=events:10m rate=17r/s;

    # Upload endpoints (CV): 10 requests/hr per client IP
    # rate= only accepts per-second; 10/hr ≈ 1 every 360s
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=1r/s;

    # General API: 100 requests/min per client IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;

    # Return 429 Too Many Requests (not default 503)
    limit_req_status 429;

    # =========================================================================
    # Upstream: FastAPI Application
    # =========================================================================
    upstream fastapi {
        server 127.0.0.1:8000;

        # For Docker Compose, use the service name instead:
        # server app:8000;

        keepalive 32;
    }

    # =========================================================================
    # Include server blocks
    # =========================================================================
    include /etc/nginx/conf.d/*.conf;
}
