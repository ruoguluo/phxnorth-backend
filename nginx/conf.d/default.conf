# =============================================================================
# PhxNorth Backend - Server Block Configuration
# =============================================================================
# Two server blocks:
#   1. HTTP (port 80)  - Redirects to HTTPS in production, serves in dev
#   2. HTTPS (port 443) - SSL termination with reverse proxy
#
# For local development without SSL, comment out the HTTPS block
# and remove the redirect in the HTTP block.
# =============================================================================

# =============================================================================
# HTTP Server - Redirect to HTTPS (production) / Direct proxy (development)
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # -------------------------------------------------------------------
    # Option A: Production - Redirect all HTTP to HTTPS
    # Uncomment the block below and comment out Option B
    # -------------------------------------------------------------------
    # location / {
    #     return 301 https://$host$request_uri;
    # }
    #
    # # Let's Encrypt ACME challenge (keep accessible over HTTP)
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    # -------------------------------------------------------------------
    # Option B: Development - Proxy directly without SSL
    # Comment out this block when enabling SSL in production
    # -------------------------------------------------------------------
    location / {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check - no rate limit, always accessible
    location /api/v1/health {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No access log for health checks (reduce noise)
        access_log off;
    }
}

